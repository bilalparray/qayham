<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — QAYHAM</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/images/logo/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/style.css" />
    <script>
        (function () {
            var path = window.location.pathname;
            if (path.startsWith("/join/")) {
                window.location.replace("/cloudnotes" + path + window.location.search + window.location.hash);
            }
        })();
    </script>
</head>

<body>

    <header class="site-header scrolled" id="siteHeader">
        <div class="container header-inner">
            <a href="/" class="logo">
                <img src="/images/logo/gradientlogo.webp" alt="QAYHAM" class="logo-img" />
                <span class="logo-text">QAYHAM</span>
            </a>

            <nav class="nav" id="mainNav">
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/#products">Products</a></li>
                    <li><a href="/#services">Services</a></li>
                    <li><a href="/#contact">Contact</a></li>
                </ul>
                <a href="/cloudnotes/" class="btn btn-sm btn-primary nav-cta">Cloud Notes</a>
            </nav>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="error-page">
            <div class="container error-inner">
                <p class="error-code">404</p>
                <h1>Page not found</h1>
                <p class="error-desc">
                    The page you're looking for doesn't exist or may have been moved.
                    Try one of the links below or head back home.
                </p>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">
                        Back to Home
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                    <a href="/#products" class="btn btn-outline">View Apps</a>
                    <a href="/cloudnotes/" class="btn btn-outline">Cloud Notes</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 QAYHAM. All rights reserved. · <a href="/privacy.html">Privacy Policy</a></p>
            </div>
        </div>
    </footer>

    <script src="/app.js"></script>

</html>
